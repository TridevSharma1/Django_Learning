<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Categories</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background: #f4f6f9;
        padding: 40px;
    }

    h1{
        text-align:center;
        margin-bottom:40px;
        color:#222;
        font-size:40px;
    }

    .container{
        width:90%;
        margin:auto;
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
        gap:25px;
    }

    .card{
        background:#fff;
        border-radius:15px;
        overflow:hidden;
        box-shadow:0 5px 15px rgba(0,0,0,0.1);
        transition:0.3s ease;
    }

    .card:hover{
        transform:translateY(-8px);
        box-shadow:0 10px 20px rgba(0,0,0,0.15);
    }

    .card img{
        width:100%;
        height:220px;
        object-fit:cover;
    }

    .no-image{
        height:220px;
        display:flex;
        align-items:center;
        justify-content:center;
        background:#ddd;
        color:#555;
        font-size:18px;
    }

    .card-body{
        padding:20px;
        text-align:center;
    }

    .card-body h2{
        font-size:24px;
        color:#333;
        margin-bottom:10px;
    }

    .btn{
        display:inline-block;
        padding:10px 20px;
        background:#007bff;
        color:white;
        text-decoration:none;
        border-radius:8px;
        transition:0.3s;
        font-size:15px;
    }

    .btn:hover{
        background:#0056b3;
    }

</style>
</head>

<body>

<h1>All Categories</h1>

<div class="container">

{% for category in categories %}
    <div class="card">

        {% if category.category_image %}
            <img src="{{ category.category_image.url }}" alt="">
        {% else %}
            <div class="no-image">No Image</div>
        {% endif %}

        <div class="card-body">
            <h2>{{ category.category_name }}</h2>
            <a href="#" class="btn">View More</a>
        </div>

    </div>
{% endfor %}

</div>

</body>
</html>
